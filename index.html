
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  .app{display:flex;flex-direction:column;height:700px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);overflow:hidden;font-family:var(--font-sans);background:var(--color-background-tertiary);}
  .topbar{display:flex;align-items:center;gap:6px;padding:0 12px;height:42px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0;}
  .logo{font-size:13px;font-weight:500;color:#185FA5;padding-right:10px;border-right:0.5px solid var(--color-border-tertiary);margin-right:2px;}
  .tab-bar{display:flex;gap:2px;}
  .tab{font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;color:var(--color-text-secondary);border:0.5px solid transparent;transition:all 0.12s;user-select:none;}
  .tab:hover{background:var(--color-background-secondary);color:var(--color-text-primary);}
  .tab.active{background:#E6F1FB;color:#185FA5;border-color:var(--color-border-tertiary);font-weight:500;}
  .topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
  .auto-lbl{font-size:11px;color:var(--color-text-tertiary);display:flex;align-items:center;gap:4px;cursor:pointer;}
  .run-btn{font-size:12px;font-weight:500;padding:5px 14px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:opacity 0.12s;}
  .run-btn:hover{opacity:0.85;}
  .run-btn:active{transform:scale(0.97);}
  .tri{width:0;height:0;border-style:solid;border-width:4px 0 4px 7px;border-color:transparent transparent transparent #fff;display:inline-block;}
  .workspace{display:flex;flex:1;overflow:hidden;min-height:0;}
  .editors{display:flex;flex-direction:column;width:340px;flex-shrink:0;border-right:0.5px solid var(--color-border-secondary);}
  .pane{display:flex;flex-direction:column;flex:1;min-height:0;border-bottom:0.5px solid var(--color-border-tertiary);}
  .pane:last-child{border-bottom:none;}
  .pane.collapsed{flex:0 0 auto;}
  .pane-hdr{display:flex;align-items:center;justify-content:space-between;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.8px;color:var(--color-text-tertiary);padding:5px 10px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0;cursor:pointer;user-select:none;}
  .pane-hdr:hover{color:var(--color-text-secondary);}
  .collapse-icon{font-size:10px;color:var(--color-text-tertiary);}
  .editor{flex:1;width:100%;background:var(--color-background-primary);border:none;outline:none;font-family:var(--font-mono);font-size:12px;line-height:1.65;color:var(--color-text-primary);padding:10px;resize:none;tab-size:2;}
  .editor.hidden{display:none;}
  .right-panel{display:flex;flex-direction:column;flex:1;min-width:0;}
  .browser-chrome{background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-secondary);padding:8px 10px;flex-shrink:0;}
  .browser-bar{display:flex;align-items:center;gap:8px;}
  .dots{display:flex;gap:5px;}
  .dot{width:10px;height:10px;border-radius:50%;}
  .dot-r{background:#E24B4A;}
  .dot-y{background:#EF9F27;}
  .dot-g{background:#1D9E75;}
  .nav-btns{display:flex;gap:4px;}
  .nav-btn{width:22px;height:22px;border-radius:5px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-tertiary);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
  .nav-btn:hover{color:var(--color-text-secondary);background:var(--color-background-primary);}
  .url-bar{flex:1;height:26px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);padding:0 10px;font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);display:flex;align-items:center;gap:6px;}
  .url-lock{width:8px;height:8px;border-radius:1px;border:1.5px solid #1D9E75;position:relative;flex-shrink:0;}
  .url-lock::after{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:6px;height:5px;border:1.5px solid #1D9E75;border-radius:3px 3px 0 0;border-bottom:none;}
  .url-text{font-size:11px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .reload-icon{margin-left:auto;font-size:13px;color:var(--color-text-tertiary);cursor:pointer;}
  .reload-icon:hover{color:var(--color-text-primary);}
  .browser-tabs{display:flex;gap:2px;margin-top:6px;align-items:flex-end;}
  .btab{font-size:11px;padding:4px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-bottom:none;border-radius:5px 5px 0 0;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px;}
  .btab.active-tab{color:var(--color-text-primary);font-weight:500;}
  .btab-dot{width:6px;height:6px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
  .btab-close{font-size:10px;color:var(--color-text-tertiary);margin-left:2px;}
  .btab-close:hover{color:var(--color-text-primary);}
  .new-tab{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--color-text-tertiary);cursor:pointer;border-radius:4px;}
  .new-tab:hover{background:var(--color-background-primary);color:var(--color-text-secondary);}
  .preview-frame{flex:1;border:none;background:#fff;width:100%;}
  .console-pane{height:130px;border-top:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);display:flex;flex-direction:column;flex-shrink:0;}
  .console-pane.hidden{display:none;}
  .console-hdr{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.8px;color:var(--color-text-tertiary);padding:5px 10px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .con-clear{font-size:10px;color:var(--color-text-tertiary);cursor:pointer;font-weight:400;text-transform:none;letter-spacing:0;}
  .con-clear:hover{color:var(--color-text-secondary);}
  .con-out{flex:1;font-family:var(--font-mono);font-size:11px;padding:6px 10px;overflow-y:auto;color:var(--color-text-secondary);}
  .cline{padding:1px 0;}
  .cline.log{color:var(--color-text-secondary);}
  .cline.error{color:#E24B4A;}
  .cline.warn{color:#BA7517;}
  .cline.info{color:#185FA5;}
  .statusbar{height:22px;background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 12px;gap:12px;flex-shrink:0;}
  .st{font-size:10px;color:var(--color-text-tertiary);}
  .st-ok{color:#1D9E75;}
  .resizer{width:3px;background:transparent;cursor:col-resize;flex-shrink:0;}
  .resizer:hover,.resizer.drag{background:#185FA5;}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);}
</style>

<h2 class="sr-only">CodeBin editor with browser-style output preview, collapsible editor panes, and console</h2>
<div class="app">
  <div class="topbar">
    <div class="logo">CodeBin</div>
    <div class="tab-bar">
      <div class="tab active" data-pane="html">HTML</div>
      <div class="tab active" data-pane="css">CSS</div>
      <div class="tab active" data-pane="js">JS</div>
      <div class="tab" id="con-toggle">Console</div>
    </div>
    <div class="topbar-right">
      <label class="auto-lbl"><input type="checkbox" id="auto-run" style="accent-color:#185FA5;"> Auto-run</label>
      <button class="run-btn" id="run-btn"><span class="tri"></span> Run</button>
    </div>
  </div>

  <div class="workspace">
    <div class="editors" id="editors">
      <div class="pane" id="pane-html">
        <div class="pane-hdr" data-collapse="html"><span>HTML</span><span class="collapse-icon" id="ci-html">▾</span></div>
        <textarea class="editor" id="ed-html" spellcheck="false"></textarea>
      </div>
      <div class="pane" id="pane-css">
        <div class="pane-hdr" data-collapse="css"><span>CSS</span><span class="collapse-icon" id="ci-css">▾</span></div>
        <textarea class="editor" id="ed-css" spellcheck="false"></textarea>
      </div>
      <div class="pane" id="pane-js">
        <div class="pane-hdr" data-collapse="js"><span>JS</span><span class="collapse-icon" id="ci-js">▾</span></div>
        <textarea class="editor" id="ed-js" spellcheck="false"></textarea>
      </div>
    </div>

    <div class="resizer" id="main-resizer"></div>

    <div class="right-panel">
      <div class="browser-chrome">
        <div class="browser-bar">
          <div class="dots">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
          </div>
          <div class="nav-btns">
            <button class="nav-btn" id="back-btn" title="Back">&#8592;</button>
            <button class="nav-btn" id="fwd-btn" title="Forward">&#8594;</button>
          </div>
          <div class="url-bar">
            <div class="url-lock"></div>
            <span class="url-text" id="url-text">codebin://preview/index.html</span>
            <span class="reload-icon" id="reload-btn" title="Reload">&#8635;</span>
          </div>
        </div>
        <div class="browser-tabs">
          <div class="btab active-tab"><span class="btab-dot"></span> Preview <span class="btab-close">&#x2715;</span></div>
          <div class="new-tab">+</div>
        </div>
      </div>

      <iframe class="preview-frame" id="preview" sandbox="allow-scripts allow-same-origin allow-modals"></iframe>

      <div class="console-pane hidden" id="console-pane">
        <div class="console-hdr">Console <span class="con-clear" id="con-clear">clear</span></div>
        <div class="con-out" id="con-out"><div class="cline info">› Ready</div></div>
      </div>

      <div class="statusbar">
        <span class="st st-ok" id="st-text">Ready</span>
        <span class="st" id="st-chars">0 chars</span>
      </div>
    </div>
  </div>
</div>

<script>
const edHtml = document.getElementById('ed-html');
const edCss  = document.getElementById('ed-css');
const edJs   = document.getElementById('ed-js');
const preview = document.getElementById('preview');
const runBtn  = document.getElementById('run-btn');
const autoRun = document.getElementById('auto-run');
const stText  = document.getElementById('st-text');
const stChars = document.getElementById('st-chars');
const conPane = document.getElementById('console-pane');
const conOut  = document.getElementById('con-out');
const conToggle = document.getElementById('con-toggle');
const conClear  = document.getElementById('con-clear');
const reloadBtn = document.getElementById('reload-btn');

edHtml.value = `<div class="card">
  <h1>Hello, CodeBin!</h1>
  <p>Edit the HTML, CSS, and JS panes, then click <strong>Run</strong>.</p>
  <button onclick="greet()">Say Hello</button>
</div>`;

edCss.value = `body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #f0f4f8;
}
.card {
  background: white;
  border-radius: 14px;
  padding: 2.5rem 3rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.09);
  text-align: center;
  max-width: 380px;
}
h1 { color: #185FA5; margin-bottom: 0.75rem; font-size: 1.75rem; }
p { color: #555; line-height: 1.65; margin-bottom: 1.5rem; }
button {
  background: #185FA5; color: white; border: none;
  padding: 10px 24px; border-radius: 8px; cursor: pointer;
  font-size: 14px; transition: background 0.15s;
}
button:hover { background: #0c447c; }`;

edJs.value = `function greet() {
  const names = ['World', 'Developer', 'Coder', 'Friend'];
  const pick = names[Math.floor(Math.random() * names.length)];
  alert('Hello, ' + pick + '!');
  console.log('Greeted:', pick);
}`;

let conVisible = false;
let arTimer = null;

function buildDoc() {
  const intercept = `(function(){var l=console.log.bind(console),e=console.error.bind(console),w=console.warn.bind(console),i=console.info.bind(console);function p(t,a){try{window.parent.postMessage({_cb:true,type:t,msg:Array.from(a).map(String).join(' ')},'*');}catch(x){}}console.log=function(){p('log',arguments);l.apply(console,arguments);};console.error=function(){p('error',arguments);e.apply(console,arguments);};console.warn=function(){p('warn',arguments);w.apply(console,arguments);};console.info=function(){p('info',arguments);i.apply(console,arguments);};window.addEventListener('error',function(ev){p('error',[ev.message+' (line '+ev.lineno+')']);});})();`;
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${edCss.value}</style></head><body>${edHtml.value}<script>${intercept}\ntry{${edJs.value}}catch(e){console.error(e.message)}<\/script></body></html>`;
}

function run() {
  preview.srcdoc = buildDoc();
  const total = edHtml.value.length + edCss.value.length + edJs.value.length;
  stChars.textContent = total.toLocaleString() + ' chars';
  stText.textContent = 'Ran ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  stText.className = 'st st-ok';
}

runBtn.addEventListener('click', run);
reloadBtn.addEventListener('click', run);

[edHtml, edCss, edJs].forEach(el => {
  el.addEventListener('input', () => {
    if (!autoRun.checked) return;
    clearTimeout(arTimer);
    arTimer = setTimeout(run, 800);
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = el.selectionStart;
      el.value = el.value.substring(0,s) + '  ' + el.value.substring(el.selectionEnd);
      el.selectionStart = el.selectionEnd = s + 2;
    }
    if ((e.ctrlKey||e.metaKey) && e.key === 'Enter') { e.preventDefault(); run(); }
  });
});

window.addEventListener('message', e => {
  if (!e.data || !e.data._cb) return;
  const line = document.createElement('div');
  line.className = 'cline ' + e.data.type;
  const pfx = {log:'›',error:'✕',warn:'⚠',info:'ℹ'}[e.data.type]||'›';
  line.textContent = pfx + ' ' + e.data.msg;
  conOut.appendChild(line);
  conOut.scrollTop = conOut.scrollHeight;
  if (!conVisible) { conToggle.style.fontWeight='500'; conToggle.style.color = e.data.type==='error'?'#E24B4A':'#185FA5'; }
});

conToggle.addEventListener('click', () => {
  conVisible = !conVisible;
  conPane.classList.toggle('hidden', !conVisible);
  conToggle.classList.toggle('active', conVisible);
  if (conVisible) { conToggle.style.fontWeight=''; conToggle.style.color=''; }
});

conClear.addEventListener('click', () => { conOut.innerHTML = ''; });

document.querySelectorAll('.tab[data-pane]').forEach(tab => {
  tab.addEventListener('click', () => {
    const paneEl = document.getElementById('pane-' + tab.dataset.pane);
    const edEl   = document.getElementById('ed-' + tab.dataset.pane);
    if (!paneEl || !edEl) return;
    const hiding = !edEl.classList.contains('hidden');
    edEl.classList.toggle('hidden', hiding);
    paneEl.classList.toggle('collapsed', hiding);
    tab.classList.toggle('active', !hiding);
  });
});

document.querySelectorAll('[data-collapse]').forEach(hdr => {
  hdr.addEventListener('click', () => {
    const key = hdr.dataset.collapse;
    const edEl = document.getElementById('ed-' + key);
    const paneEl = document.getElementById('pane-' + key);
    const ci = document.getElementById('ci-' + key);
    const hiding = !edEl.classList.contains('hidden');
    edEl.classList.toggle('hidden', hiding);
    paneEl.classList.toggle('collapsed', hiding);
    ci.textContent = hiding ? '▸' : '▾';
  });
});

const mainResizer = document.getElementById('main-resizer');
const editorsEl = document.getElementById('editors');
let startX2, startW;
mainResizer.addEventListener('mousedown', e => {
  startX2 = e.clientX;
  startW = editorsEl.getBoundingClientRect().width;
  mainResizer.classList.add('drag');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  const mm = ev => { editorsEl.style.width = Math.max(160, Math.min(600, startW + ev.clientX - startX2)) + 'px'; };
  const mu = () => { mainResizer.classList.remove('drag'); document.body.style.cursor=''; document.body.style.userSelect=''; document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); };
  document.addEventListener('mousemove', mm);
  document.addEventListener('mouseup', mu);
  e.preventDefault();
});

run();
</script>
